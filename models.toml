[meta]
default_model = "qwen3.6-plus"

[models.qwen3_6_plus]
alias = "qwen3.6-plus"
provider = "dashscope"
model = "qwen3.6-plus"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "DASHSCOPE_API_KEY"
description = "Qwen 3.6 Plus"
reasoning = true

[models.deepseek_chat]
alias = "deepseek-chat"
provider = "deepseek"
model = "deepseek-chat"
base_url = "https://api.deepseek.com"
